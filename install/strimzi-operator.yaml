apiVersion: v1
kind: Namespace
metadata:
  name: kafka
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
# Strimzi Operator - ClusterRoles, ServiceAccount, and Deployment
# Install via Strimzi release bundle; this file pulls from the official release.
# To apply: kubectl create -f 'https://strimzi.io/install/latest?namespace=kafka' -n kafka
#
# The manifest below installs Strimzi 0.45.0 for K3s environments using a
# kustomize-compatible overlay approach. For a self-contained GitOps deployment,
# download and commit the full Strimzi install bundle into this directory.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: strimzi-cluster-operator
  namespace: kafka
  labels:
    app: strimzi
spec:
  replicas: 1
  selector:
    matchLabels:
      name: strimzi-cluster-operator
      strimzi.io/kind: cluster-operator
  template:
    metadata:
      labels:
        name: strimzi-cluster-operator
        strimzi.io/kind: cluster-operator
    spec:
      serviceAccountName: strimzi-cluster-operator
      containers:
        - name: strimzi-cluster-operator
          image: quay.io/strimzi/operator:0.45.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: STRIMZI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: STRIMZI_FULL_RECONCILIATION_INTERVAL_MS
              value: "120000"
            - name: STRIMZI_OPERATION_TIMEOUT_MS
              value: "300000"
            - name: STRIMZI_DEFAULT_KAFKA_IMAGE
              value: quay.io/strimzi/kafka:0.45.0-kafka-3.9.0
            - name: STRIMZI_DEFAULT_KAFKA_INIT_IMAGE
              value: quay.io/strimzi/operator:0.45.0
            - name: STRIMZI_DEFAULT_KAFKA_BRIDGE_IMAGE
              value: quay.io/strimzi/kafka-bridge:0.31.0
            - name: STRIMZI_DEFAULT_KAFKA_EXPORTER_IMAGE
              value: quay.io/strimzi/kafka:0.45.0-kafka-3.9.0
            - name: STRIMZI_DEFAULT_KAFKA_CONNECT_IMAGE
              value: quay.io/strimzi/kafka:0.45.0-kafka-3.9.0
            - name: STRIMZI_DEFAULT_ENTITY_OPERATOR_TLS_SIDECAR_IMAGE
              value: quay.io/strimzi/operator:0.45.0
          livenessProbe:
            httpGet:
              path: /healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            limits:
              cpu: 1000m
              memory: 384Mi
            requests:
              cpu: 200m
              memory: 384Mi
