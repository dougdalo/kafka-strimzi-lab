apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-connect
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dougdalo/kafka-strimzi-lab
    targetRevision: main
    path: connect
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  ignoreDifferences:
    - group: kafka.strimzi.io
      kind: KafkaConnect
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
